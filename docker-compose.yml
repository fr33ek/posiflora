services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: "!ChangeMe!"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://app:!ChangeMe!@db:5432/app?serverVersion=16&charset=utf8"
      TELEGRAM_USE_REAL: "1"
      TELEGRAM_MOCK_FORCE_FAIL: "0"
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  pgdata:

